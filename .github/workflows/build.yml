name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 0.2.0) — leave empty to use Cargo.toml version'
        required: false

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.id }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          elif [[ -n "${{ github.event.inputs.version }}" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building version: $VERSION"

      - name: Create GitHub Release
        id: create
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Glitch Goblin v${{ steps.version.outputs.version }}
          draft: true
          prerelease: false
          generate_release_notes: true

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            label: Windows
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: Linux

    runs-on: ${{ matrix.os }}
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Set version in config files
        shell: bash
        run: |
          VERSION="${{ needs.create-release.outputs.version }}"
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" Cargo.toml
          sed -i "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" tauri.conf.json

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci || npm install

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Remove beforeBuildCommand (already built above)
        shell: bash
        run: |
          node -e "
            const fs = require('fs');
            const c = JSON.parse(fs.readFileSync('tauri.conf.json','utf8'));
            delete c.build.beforeBuildCommand;
            delete c.build.beforeDevCommand;
            fs.writeFileSync('tauri.conf.json', JSON.stringify(c, null, 2));
          "

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Build Tauri app (Windows)
        if: matrix.os == 'windows-latest'
        run: cargo tauri build --bundles nsis

      - name: Build Tauri app (Linux)
        if: matrix.os == 'ubuntu-22.04'
        run: cargo tauri build --bundles appimage

      - name: Prepare release artifacts
        shell: bash
        run: |
          VERSION="${{ needs.create-release.outputs.version }}"
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            cp target/release/glitch-goblin.exe "target/release/Glitch-Goblin-v${VERSION}-windows-x64.exe"
            cp target/release/bundle/nsis/*.exe "target/release/Glitch-Goblin-v${VERSION}-windows-x64-setup.exe" 2>/dev/null || true
          else
            cp target/release/glitch-goblin "target/release/Glitch-Goblin-v${VERSION}-linux-amd64"
            cp target/release/bundle/appimage/*.AppImage "target/release/Glitch-Goblin-v${VERSION}-linux-amd64.AppImage" 2>/dev/null || true
          fi

      - name: Upload artifacts + signature files
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.create-release.outputs.version }}
          draft: true
          files: |
            target/release/Glitch-Goblin-v*
            target/release/bundle/nsis/*.nsis.zip
            target/release/bundle/nsis/*.nsis.zip.sig
            target/release/bundle/appimage/*.AppImage.tar.gz
            target/release/bundle/appimage/*.AppImage.tar.gz.sig

  generate-latest-json:
    needs: [create-release, build]
    runs-on: ubuntu-latest
    steps:
      - name: Generate latest.json for Tauri Updater
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ needs.create-release.outputs.version }}"
          TAG="v${VERSION}"
          REPO="${{ github.repository }}"
          BASE_URL="https://github.com/${REPO}/releases/download/${TAG}"

          # Detect available assets
          ASSETS=$(gh api repos/${REPO}/releases/${{ needs.create-release.outputs.release_id }} --jq '.assets[].name')

          # Build platforms JSON
          PLATFORMS="{}"

          # Download signature files via API (draft assets are not public)
          RELEASE_ID="${{ needs.create-release.outputs.release_id }}"

          # Windows NSIS
          WIN_SIG=""
          WIN_URL=""
          for a in $ASSETS; do
            case "$a" in
              *.nsis.zip.sig)
                ASSET_ID=$(gh api "repos/${REPO}/releases/${RELEASE_ID}" --jq ".assets[] | select(.name==\"$a\") | .id")
                WIN_SIG=$(gh api "repos/${REPO}/releases/assets/${ASSET_ID}" -H "Accept: application/octet-stream" 2>/dev/null || echo "")
                ;;
              *.nsis.zip) WIN_URL="${BASE_URL}/$a" ;;
            esac
          done
          if [[ -n "$WIN_URL" && -n "$WIN_SIG" ]]; then
            PLATFORMS=$(echo "$PLATFORMS" | jq --arg url "$WIN_URL" --arg sig "$WIN_SIG" '. + {"windows-x86_64": {"signature": $sig, "url": $url}}')
          fi

          # Linux AppImage
          LINUX_SIG=""
          LINUX_URL=""
          for a in $ASSETS; do
            case "$a" in
              *.AppImage.tar.gz.sig)
                ASSET_ID=$(gh api "repos/${REPO}/releases/${RELEASE_ID}" --jq ".assets[] | select(.name==\"$a\") | .id")
                LINUX_SIG=$(gh api "repos/${REPO}/releases/assets/${ASSET_ID}" -H "Accept: application/octet-stream" 2>/dev/null || echo "")
                ;;
              *.AppImage.tar.gz) LINUX_URL="${BASE_URL}/$a" ;;
            esac
          done
          if [[ -n "$LINUX_URL" && -n "$LINUX_SIG" ]]; then
            PLATFORMS=$(echo "$PLATFORMS" | jq --arg url "$LINUX_URL" --arg sig "$LINUX_SIG" '. + {"linux-x86_64": {"signature": $sig, "url": $url}}')
          fi

          # Fetch release notes from GitHub
          RELEASE_BODY=$(gh api "repos/${REPO}/releases/${RELEASE_ID}" --jq '.body // ""' 2>/dev/null || echo "")
          if [[ -z "$RELEASE_BODY" ]]; then
            RELEASE_BODY="Release v${VERSION} — Details: https://github.com/${REPO}/releases/tag/${TAG}"
          fi

          # Write latest.json
          jq -n \
            --arg version "$VERSION" \
            --arg notes "$RELEASE_BODY" \
            --arg pub_date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --argjson platforms "$PLATFORMS" \
            '{version: $version, notes: $notes, pub_date: $pub_date, platforms: $platforms}' \
            > latest.json

          cat latest.json

      - name: Upload latest.json to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.create-release.outputs.version }}
          draft: true
          files: latest.json

  publish-release:
    needs: [create-release, build, generate-latest-json]
    runs-on: ubuntu-latest
    steps:
      - name: Publish release (remove draft)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.create-release.outputs.version }}
          draft: false
